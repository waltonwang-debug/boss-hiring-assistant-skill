version: "1"
locale: "zh-CN"
pack_id: "default-zh-cn"
templates:
  request_attachment_resume: |
    您好，我这边在看您投递/沟通的{{job_title}}岗位，您的经历和岗位方向整体比较匹配。
    为了进一步评估并尽快推进流程，方便的话麻烦您发送一份最新的附件简历，PDF 格式优先。
    我这边收到后会尽快帮您安排后续沟通，谢谢。
  attachment_followup: |
    您好，想跟进一下附件简历这边的情况。
    如果您方便的话，可以直接发一份最新 PDF 简历给我，我这边收到后会尽快帮您继续推进流程。
  interview_intent_probe: |
    您好，结合目前了解的信息，您的背景和{{job_title}}岗位匹配度不错。
    如果您近期有意向进一步了解这个机会，我这边可以帮您安排一轮面试沟通，您看是否方便继续推进？
  collect_availability: |
    好的，那我这边继续为您安排面试。
    想先和您确认下，您最近两个工作日内大致方便参加面试的时间段是哪些？您给我 2 到 3 个可选时间段就可以。
  confirm_interview_time: |
    和您确认一下，咱们先定在{{interview_time}}进行面试，您看这个时间是否方便？
    如果可以，我这边确认后会把面试链接发给您。
  send_feishu_schedule_link: |
    您好，面试已经为您安排好了，时间是{{interview_time}}。
    飞书面试链接如下：{{feishu_link}}
    建议您提前几分钟进入会议，保持网络和设备正常。如果临时有变动，也请尽快在这里和我说一声。
  candidate_reject_polite: |
    您好，非常感谢您对{{company_name}}和{{job_title}}岗位的关注。
    结合当前岗位需求和本轮评估结果，这次我们暂时先不继续推进了。
    也感谢您花时间沟通，后续如果有更合适的机会，我们也会再关注。祝您求职顺利。
  faq_role_intro: |
    这个岗位目前主要聚焦在{{job_title}}相关工作，会结合团队当前业务目标推进具体职责。
    如果您愿意，我也可以继续和您介绍后续流程安排。
  faq_salary_range: |
    目前这个岗位的薪资范围大致参考是{{salary_note}}。
    具体方案还需要结合您的经历匹配度和后续面试评估来综合确认。
  faq_interview_process: |
    目前大致流程是先进行一轮初步面试沟通，后续如匹配会继续安排下一步。
    具体节奏我这边会根据您的推进情况及时同步给您。
  uncertain_answer_escalate: |
    您这个问题我先帮您进一步确认一下，确认后我会尽快回复您。
